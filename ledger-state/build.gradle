dependencies {
    api project(':node-api')
    api project(':core')

    implementation libs.rocksdb
    implementation libs.cbor
    implementation libs.cardano.client.core
    api(libs.cf.rewards.calculation) {
        // Exclude transitive google-collections which conflicts with guava in Quarkus
        exclude group: 'com.google.collections', module: 'google-collections'
    }

    // Generate @DomainEventListener bindings at build time
    annotationProcessor project(':events-processor')
}

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yaci Ledger State'
                description = 'Yaci Ledger State - Account and delegation state tracking for Cardano ledger validation'
            }
        }
    }
}
