quarkus:
  application:
    name: yaci-node
  package:
    output-name: yaci-node
    jar:
      type: uber-jar
      add-runner-suffix: false
  http:
    port: 7070
    test-port: 0
  log:
    level: INFO
    category:
      "com.bloxbean.cardano.yaci":
        level: INFO
  smallrye-openapi:
    info-title: "Yaci Node API"
    info-version: "${quarkus.application.version:0.1.0}"
    info-description: "Cardano Yaci Node REST API"
  swagger-ui:
    always-include: ${YACI_SWAGGER_UI_ENABLED:true}
    path: /q/swagger-ui
  banner:
    enabled: true
    path: "banner.txt"

yaci:
  events:
    enabled: true
  plugins:
    enabled: true
    directory: plugins
    logging:
      enabled: false
  node:
    network: preprod
    auto-sync-start: true
    client:
      enabled: true
    remote:
      host: preprod-node.world.dev.cardano.org
      port: 30000
      protocol-magic: 1
    server:
      enabled: true
      port: 13337
    storage:
      rocksdb: true
      path: "./chainstate"
    genesis:
      shelley-genesis-file: config/network/preprod/shelley-genesis.json
      shelley-genesis-hash: "162d29c4e1cf6b8a84f2d692e67a3ac6bc7851bc3e6e4afe64d15778bed8bd86"
      byron-genesis-file: config/network/preprod/byron-genesis.json
      alonzo-genesis-file: config/network/preprod/alonzo-genesis.json
      conway-genesis-file: config/network/preprod/conway-genesis.json
      protocol-parameters-file: config/network/preprod/protocol-param.json
    dev-mode: false
    account-state:
      enabled: true
    epoch-snapshot:
      amounts-enabled: true
    adapot:
      enabled: true
    rewards:
      enabled: true
    epoch-params:
      tracking-enabled: true
    governance:
      enabled: true
    chain:
      block-body-prune-depth: 0          # blocks to retain (0 = disabled)
      block-prune-batch-size: 500000     # entries per prune pass
      block-prune-interval-seconds: 300
    filters:
      utxo:
        enabled: false
        addresses: []
        payment-credentials: []
    block-producer:
      enabled: false
      block-time-millis: 0
      lazy: false
      genesis-timestamp: 0
      slot-length-millis: 0
      start-epoch: 0
      past-time-travel-mode: false
      tx-evaluation: true

"%native":
  quarkus:
    package:
      jar:
        enabled: false
    native:
      enabled: true

"%devnet":
  yaci:
    node:
      network: devnet
      auto-sync-start: true
      dev-mode: true
      client:
        enabled: false
      remote:
        protocol-magic: 42
      genesis:
        shelley-genesis-file: config/network/devnet/shelley-genesis.json
        shelley-genesis-hash: ""
        byron-genesis-file: config/network/devnet/byron-genesis.json
        alonzo-genesis-file: config/network/devnet/alonzo-genesis.json
        conway-genesis-file: config/network/devnet/conway-genesis.json
        protocol-parameters-file: config/network/devnet/protocol-param.json
      account-state:
        enabled: true
      epoch-snapshot:
        amounts-enabled: false          # UTXO balance aggregation in snapshots
      adapot:
        enabled: false                  # Treasury/reserves tracking
      rewards:
        enabled: false                  # Epoch reward calculation
      epoch-params:
        tracking-enabled: false         # Protocol param tracking from blocks
      block-producer:
        enabled: true
        block-time-millis: 0
        lazy: false
        genesis-timestamp: 0
        slot-length-millis: 0
        vrf-skey-file: config/network/devnet/vrf.skey
        kes-skey-file: config/network/devnet/kes.skey
        opcert-file: config/network/devnet/opcert.cert

"%devnet-slotleader":
  yaci:
    node:
      network: devnet
      auto-sync-start: true
      dev-mode: true
      client:
        enabled: false
      remote:
        protocol-magic: 42
      genesis:
        shelley-genesis-file: config/network/devnet/shelley-genesis.json
        shelley-genesis-hash: ""
        byron-genesis-file: config/network/devnet/byron-genesis.json
        alonzo-genesis-file: config/network/devnet/alonzo-genesis.json
        conway-genesis-file: config/network/devnet/conway-genesis.json
        protocol-parameters-file: config/network/devnet/protocol-param.json
      block-producer:
        enabled: true
        slot-leader-mode: true
        lazy: false
        genesis-timestamp: 0
        slot-length-millis: 0
        start-epoch: 0
        vrf-skey-file: config/network/devnet/vrf.skey
        kes-skey-file: config/network/devnet/kes.skey
        opcert-file: config/network/devnet/opcert.cert

"%mainnet":
  yaci:
    node:
      network: mainnet
      remote:
        host: backbone.cardano.iog.io
        port: 3001
        protocol-magic: 764824073
      genesis:
        shelley-genesis-file: config/network/mainnet/shelley-genesis.json
        shelley-genesis-hash: "1a3be38bcbb7911969283716ad7aa550250226b76a61fc51cc9a9a35d9276d81"
        byron-genesis-file: config/network/mainnet/byron-genesis.json
        alonzo-genesis-file: config/network/mainnet/alonzo-genesis.json
        conway-genesis-file: config/network/mainnet/conway-genesis.json
        protocol-parameters-file: config/network/mainnet/protocol-param.json

"%preview":
