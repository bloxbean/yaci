quarkus:
  application:
    name: yaci-node
  package:
    output-name: yaci-node
    jar:
      add-runner-suffix: false
  http:
    port: 8080
    test-port: 0
  log:
    level: INFO
    category:
      "com.bloxbean.cardano.yaci":
        level: INFO
  banner:
    enabled: true
    path: "banner.txt"

yaci:
  events:
    enabled: true
  plugins:
    enabled: true
    directory: plugins
    logging:
      enabled: false
  node:
    network: mainnet
    auto-sync-start: true
    client:
      enabled: true
    remote:
      host: backbone.cardano.iog.io
      port: 3001
      protocol-magic: 764824073
    server:
      enabled: true
      port: 13337
    storage:
      rocksdb: true
      path: "./chainstate"
    block-producer:
      enabled: false
      block-time-millis: 2000
      lazy: false
      genesis-timestamp: 0
      slot-length-millis: 1000
      genesis-funds-file:
      protocol-parameters-file:

"%native":
  quarkus:
    package:
      jar:
        enabled: false
    native:
      enabled: true

"%test":
  yaci:
    events:
      enabled: true
    plugins:
      enabled: false
      logging:
        enabled: false
    node:
      auto-sync-start: false
      client:
        enabled: false
      server:
        enabled: true
      storage:
        rocksdb: false
        path: "./chainstate-test"
