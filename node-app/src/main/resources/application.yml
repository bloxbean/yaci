"%test":
  yaci:
    events:
      enabled: true
    plugins:
      enabled: false
      logging:
        enabled: false
    node:
      auto-sync-start: false
      client:
        enabled: false
      server:
        enabled: true
      storage:
        rocksdb: false
        path: "./chainstate-test"
