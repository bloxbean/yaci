      network: preview
      remote:
        host: preview-node.play.dev.cardano.org
        port: 3001
        protocol-magic: 2
      genesis:
        shelley-genesis-file: config/network/preview/shelley-genesis.json
        shelley-genesis-hash: "363498d1024f84bb39d3fa9593ce391483cb40d479b87233f868d6e57c3a400d"
        byron-genesis-file: config/network/preview/byron-genesis.json
        alonzo-genesis-file: config/network/preview/alonzo-genesis.json
        conway-genesis-file: config/network/preview/conway-genesis.json
