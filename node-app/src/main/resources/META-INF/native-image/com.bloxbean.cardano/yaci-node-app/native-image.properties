# Native Image Properties for Yaci Node Application
# Config files (reflect-config.json, jni-config.json, etc.) in this directory
# are auto-discovered by GraalVM - no need to reference them explicitly.
#
# Core init args are in build.gradle quarkus native config.
# This file adds fine-grained class-level overrides for third-party deps.

