# Yaci Node - Override Configuration
# ------------------------------------
# Properties here override the defaults bundled in the jar.
# Quarkus automatically loads this file from the config/ directory.

# HTTP port (default: 8080)
 quarkus:
   http:
     port: 7070

# Genesis files (uncomment and point to local files to override bundled defaults)
# yaci:
#   node:
#     genesis:
#       shelley-genesis-file: config/network/preprod/shelley-genesis.json
#       byron-genesis-file: config/network/preprod/byron-genesis.json
#       alonzo-genesis-file: config/network/preprod/alonzo-genesis.json
#       conway-genesis-file: config/network/preprod/conway-genesis.json
#       protocol-parameters-file: config/network/preprod/protocol-param.json

# Remote node connection
# yaci:
#   node:
#     remote:
#       host: preprod-node.world.dev.cardano.org
#       port: 30000
#       protocol-magic: 1

# Storage
 yaci:
   node:
     remote:
       host: localhost
       port: 32000
       protocol-magic: 1
     storage:
       path: ./chainstate
       rocksdb: true
     snapshot-export:
       enabled: false
       dir: data

# Server
# yaci:
#   node:
#     server:
#       port: 13337

# UTXO Storage Filters
# ---------------------
# Filter UTXOs before persisting to RocksDB. Only matching outputs are stored.
# Useful for dApp-specific nodes that only need UTXOs for certain addresses.
#
# yaci:
#   node:
#     filters:
#       utxo:
#         enabled: true
#         addresses:                  # Bech32 addresses to store UTXOs for
#           - addr_test1wzn5ee2qaqvly3hx7e0nk3vhm240n5muq3plhjcnvx9ppjgf62u6a
#           - addr_test1vry3appc9j737z67gperyapaszy5u74wt0k8eq6nxjzpuusw3kd9e
#         payment-credentials:        # Payment credential hashes (28-byte hex)
#           - 6313d841f3e1d906d5a87ed9104739748a13e50cd23bf103d4883cee #addr_test1wp338kzp70sajpk44pldjyz8896g5yl9pnfrhugr6jyremsz6nwpp

# Block Body Pruning
# ---------------------
# Prune old block bodies beyond a retention window to reduce DB size.
# Headers and indices are preserved so the node can still serve as a relay.
# Set block-body-prune-depth to 0 to disable (default).
#
# yaci:
#   node:
#     chain:
#         block-body-prune-depth: 2160    # Blocks to retain (2160 ≈ Cardano finality)
#         block-prune-batch-size: 500000     # Entries per prune pass
#         block-prune-interval-seconds: 300

# Script Evaluator
# ---------------------
# Choose the script evaluator for the /utils/txs/evaluate endpoint.
# Default: scalus. aiken (JVM/jar), scalus (native image via yaci-node.sh)
#
# yaci:
#   node:
#     block-producer:
#       script-evaluator: scalus   # scalus or aiken

# Epoch Snapshot Export
# ---------------------
# Export epoch boundary data (stake delegations, DRep distribution, AdaPot, proposal status)
# to Parquet files for offline debugging and DBSync cross-verification.
# Requires the epoch-export module on the classpath.
#
# Bootstrap State Mode
# ---------------------
# Enable bootstrap to skip full chain sync and start from a specific block.
# Useful for lightweight relay mode (e.g., dApp transaction submission).
#
# yaci:
#   node:
#     bootstrap:
#       enabled: false
#       block-number: -1          # Block number to bootstrap from (-1 = latest - 100)
#       addresses:                # Addresses to fetch UTXOs for
#         - addr_test1qz...
#       utxos:                    # Specific UTXOs (format: txHash#outputIndex)
#         - "abc123...def#0"
#       provider: blockfrost     # blockfrost or koios
#       blockfrost:
#         api-key: ""
#         base-url: ""           # Optional, auto-detected from network if blank
#       koios:
#         base-url: ""           # Optional, auto-detected from network if blank
