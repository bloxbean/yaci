# Yaci Node - Override Configuration
# ------------------------------------
# Properties here override the defaults bundled in the jar.
# Quarkus automatically loads this file from the config/ directory.
#
# HTTP port (default: 8080)
# quarkus.http.port=8080
#
# Genesis files (uncomment and point to local files to override bundled defaults)
# yaci.node.genesis.shelley-genesis-file=config/network/preprod/shelley-genesis.json
# yaci.node.genesis.byron-genesis-file=config/network/preprod/byron-genesis.json
# yaci.node.genesis.alonzo-genesis-file=config/network/preprod/alonzo-genesis.json
# yaci.node.genesis.conway-genesis-file=config/network/preprod/conway-genesis.json
# yaci.node.genesis.protocol-parameters-file=config/network/preprod/protocol-param.json
#
# Remote node connection
# yaci.node.remote.host=preprod-node.world.dev.cardano.org
# yaci.node.remote.port=30000
# yaci.node.remote.protocol-magic=1
#
# Storage
# yaci.node.storage.path=./chainstate
# yaci.node.storage.rocksdb=true
#
# Server
# yaci.node.server.port=13337
