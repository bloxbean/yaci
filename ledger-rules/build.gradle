dependencies {
    api project(':node-api')
    api libs.cardano.client.core  // CCL core types: ProtocolParams, Utxo, Transaction

    implementation(libs.aiken.java.binding) {
        exclude group: 'com.bloxbean.cardano'
    }

    implementation(libs.julc.cardano.client.lib) {
        exclude group: 'com.bloxbean.cardano', module: 'cardano-client-lib'
    }

    implementation(libs.julc.vm.java) {
        exclude group: 'com.bloxbean.cardano', module: 'cardano-client-lib'
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Yaci Ledger Rules'
                description = 'Yaci Ledger Rules - Transaction validation interface for Cardano ledger rules'
            }
        }
    }
}
