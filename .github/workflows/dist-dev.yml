name: Dev Distribution Build

on:
  workflow_dispatch:
    inputs:
      build_native:
        description: 'Build native binaries'
        required: false
        type: boolean
        default: false

jobs:
  jar-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build uber-jar distribution
        run: ./gradlew :node-app:nodeDistZip -PskipSigning=true
      - name: Upload JAR distribution
        uses: actions/upload-artifact@v4
        with:
          name: jar-dist
          path: node-app/build/distributions/yaci-node-*.zip
          retention-days: 14

  native-dist:
    if: ${{ inputs.build_native }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-14
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build native binary
        run: ./gradlew :node-app:quarkusBuild -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -PskipSigning=true
      - name: Package native distribution
        run: ./gradlew :node-app:nodeNativeDistZip -PskipSigning=true
      - name: Upload native distribution
        uses: actions/upload-artifact@v4
        with:
          name: native-dist-${{ matrix.label }}
          path: node-app/build/distributions/yaci-node-native-*.zip
          retention-days: 14
